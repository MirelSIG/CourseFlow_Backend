services:
  db:
    image: postgres:15-alpine
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: courseflow
      POSTGRES_PASSWORD: courseflow
      POSTGRES_DB: courseflow_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - courseflow_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://courseflow:courseflow@db:5432/courseflow_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    volumes:
      - .:/app
    networks:
      - courseflow_net

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_COOKIE_SAMESITE: "'Lax'"
    ports:
      - "${PGADMIN_PORT:-5052}:80"
    depends_on:
      - db
    networks:
      - courseflow_net

  # frontend:
  #   image: nginx:alpine
  #   restart: always
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html
  #   networks:
  #     - courseflow_net

networks:
  courseflow_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local

